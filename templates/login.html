<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
background: linear-gradient(to right, #2a0845, #6441a5);
color: white;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
font-family: Arial;
}
.box {
background: #3b0764;
padding: 30px;
border-radius: 10px;
}
input {
display:block;
margin:10px;
padding:10px;
}
button {
background:#800080;
color:white;
padding:10px;
border:none;
}
</style>
</head>
<body>
<div class="box">
<h2>Login</h2>
<form method="post">
<input name="user">
<input name="senha" type="password">
<button>Entrar</button>
</form>
</div>
</body>
</html>
